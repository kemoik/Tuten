version: '3.8'

services:
  tuten-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tuten-website
    ports:
      - "80:80"        # Access at http://localhost
      - "8080:80"      # Fallback: http://localhost:8080
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

